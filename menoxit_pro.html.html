<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENOXIT PRO</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    color: white;
}

/* Splash fake */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: red;
    font-size: 20px;
}

/* topo */
.topo {
    background: red;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 0 20px red;
}

/* container */
.container {
    padding: 15px;
}

/* card */
.card {
    background: #0a0a0a;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 15px red;
}

/* item */
.item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

/* switch */
.switch {
    position: relative;
    width: 50px;
    height: 25px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #222;
    border-radius: 25px;
    width: 100%;
    height: 100%;
}

.slider:before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    left: 3px;
    top: 2px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider {
    background: red;
    box-shadow: 0 0 10px red;
}

input:checked + .slider:before {
    transform: translateX(25px);
}

/* botão */
.botao {
    width: 100%;
    padding: 15px;
    background: red;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 10px;
    box-shadow: 0 0 15px red;
}

/* select */
select {
    width: 100%;
    padding: 8px;
    background: black;
    color: white;
    border: 1px solid red;
    border-radius: 6px;
}

/* range */
.range {
    width: 100%;
}
</style>
</head>

<body>

</div>

</div>

</div>

<button class="botao" onclick="ativar()">ATIVAR CONFIG</button>

</div>

</body>
</html>
